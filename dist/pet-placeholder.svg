<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="petGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0378A6"/>
      <stop offset="100%" style="stop-color:#F26513"/>
    </linearGradient>
  </defs>
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#f8fafc" stroke="url(#petGradient)" stroke-width="3"/>
  <!-- Silueta de mascota (perro/gato) -->
  <g fill="url(#petGradient)" opacity="0.8">
    <!-- Cabeza -->
    <circle cx="100" cy="85" r="35"/>
    <!-- Orejas -->
    <ellipse cx="70" cy="55" rx="12" ry="20" transform="rotate(-20 70 55)"/>
    <ellipse cx="130" cy="55" rx="12" ry="20" transform="rotate(20 130 55)"/>
    <!-- Cuerpo -->
    <ellipse cx="100" cy="140" rx="40" ry="35"/>
    <!-- Ojos -->
    <circle cx="88" cy="80" r="6" fill="white"/>
    <circle cx="112" cy="80" r="6" fill="white"/>
    <circle cx="88" cy="80" r="3" fill="#333"/>
    <circle cx="112" cy="80" r="3" fill="#333"/>
    <!-- Nariz -->
    <ellipse cx="100" cy="95" rx="5" ry="4" fill="#333"/>
  </g>
</svg>